quarkus.http.port=9876

quarkus.langchain4j.timeout=120s
quarkus.langchain4j.ollama.base-url=http://olduvai.internal.archton.io:11434
quarkus.langchain4j.ollama.chat-model.model-name=qwen2.5:3b
quarkus.langchain4j.ollama.log-requests=true
quarkus.langchain4j.ollama.log-responses=true

quarkus.langchain4j.ollama.chat-model.temperature=1.0
quarkus.langchain4j.ollama.chat-model.num-predict=1000

# Dedicated model for the prompt-injection detector: same Ollama/model as above but
# temperature 0 so the returned score is a deterministic classification, not a sample.
# Selected via @RegisterAiService(modelName="detection") on PromptInjectionDetectionService.
quarkus.langchain4j.ollama.detection.base-url=http://olduvai.internal.archton.io:11434
quarkus.langchain4j.ollama.detection.chat-model.model-name=qwen2.5:3b
quarkus.langchain4j.ollama.detection.chat-model.temperature=0
quarkus.langchain4j.ollama.detection.log-requests=true
quarkus.langchain4j.ollama.detection.log-responses=true

quarkus.langchain4j.pgvector.dimension=384
rag.location=src/main/resources/rag
quarkus.langchain4j.embedding-model.provider=dev.langchain4j.model.embedding.onnx.bgesmallenq.BgeSmallEnQuantizedEmbeddingModel

quarkus.log.console.darken=1
